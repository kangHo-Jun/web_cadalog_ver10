<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대산우드랜드 - 상품 카탈로그</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- 헤더 -->
    <header class="header">
        <div class="container">
            <h1 class="logo">🏗️ 대산우드랜드</h1>
            <p class="tagline">건축자재 전문 카탈로그</p>
        </div>
    </header>

    <!-- 검색 및 필터 섹션 -->
    <section class="search-section">
        <div class="container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="상품명 또는 코드로 검색..." />
                <button id="searchBtn">🔍 검색</button>
            </div>

            <div class="filters">
                <select id="categoryFilter">
                    <option value="">전체 카테고리</option>
                </select>
                <button id="resetBtn">🔄 초기화</button>
            </div>
        </div>
    </section>

    <!-- 주요 품목 20선 (테이블 형식) -->
    <section class="products-section" id="featuredSection">
        <div class="container">
            <div class="section-header">
                <h2>🏆 주요 품목 20선</h2>
            </div>

            <div class="table-wrapper">
                <table id="featuredTable" class="product-table">
                    <thead>
                        <tr>
                            <th>순서</th>
                            <th>상품코드</th>
                            <th>상품명</th>
                            <th>카테고리</th>
                            <th>가격</th>
                            <th>견적</th>
                        </tr>
                    </thead>
                    <tbody id="featuredTableBody">
                        <!-- 상품이 동적으로 추가됩니다 -->
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- 검색 결과 (테이블 형식) -->
    <section class="products-section" id="catalogSection">
        <div class="container">
            <div class="section-header">
                <h2>🔍 검색 결과</h2>
                <div class="product-count">
                    총 <span id="totalCount">0</span>개 상품
                </div>
            </div>

            <div class="table-wrapper">
                <table id="searchResultTable" class="product-table">
                    <thead>
                        <tr>
                            <th>순서</th>
                            <th>상품코드</th>
                            <th>상품명</th>
                            <th>카테고리</th>
                            <th>가격</th>
                            <th>견적</th>
                        </tr>
                    </thead>
                    <tbody id="searchResultTableBody">
                        <!-- 검색 결과가 동적으로 추가됩니다 -->
                    </tbody>
                </table>
            </div>

            <div id="noResults" class="no-results" style="display: none;">
                검색 결과가 없습니다.
            </div>
        </div>
    </section>

    <!-- 견적 요청 패널 -->
    <div id="quotePanel" class="quote-panel">
        <div class="quote-header">
            <h3>📋 견적 요청</h3>
            <button id="closeQuote" class="close-btn">✕</button>
        </div>

        <div class="quote-body">
            <div id="quoteItems" class="quote-items">
            </div>

            <div class="quote-summary">
                <div class="summary-row">
                    <span>총 품목 수:</span>
                    <span id="quoteItemCount">0</span>개
                </div>
                <div class="summary-row total">
                    <span>총 금액:</span>
                    <span id="quoteTotalPrice">0</span>원
                </div>
            </div>

            <div class="quote-actions">
                <button id="downloadQuote" class="btn-primary">📥 견적서 다운로드</button>
                <button id="emailQuote" class="btn-secondary">📧 이메일 전송</button>
            </div>
        </div>
    </div>

    <!-- 견적 요청 버튼 (고정) -->
    <button id="openQuote" class="floating-quote-btn">
        📋 견적 요청 (<span id="quoteCount">0</span>)
    </button>

    <script src="app.js"></script>
</body>

</html>
